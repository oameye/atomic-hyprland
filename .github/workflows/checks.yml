name: checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check-config:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check build config
        run: bash build_files/check-config.sh

  lint-shell:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck and just
        run: sudo apt-get update && sudo apt-get install -y shellcheck just

      - name: Lint shell scripts
        run: just lint

  format-shell:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install shfmt and just
        run: sudo apt-get update && sudo apt-get install -y shfmt just

      - name: Check shell formatting
        run: just format-check
