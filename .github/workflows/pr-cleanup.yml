name: pr-cleanup

on:
  pull_request:
    types: [closed]

jobs:
  delete-pr-tag:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Delete pr-${{ github.event.pull_request.number }} package version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PKG: atomic-hyprland
          TAG: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh api --paginate \
            "/users/${OWNER}/packages/container/${PKG}/versions" \
            --jq ".[] | select(.metadata.container.tags[]? == \"${TAG}\") | .id" |
          while read -r id; do
            gh api -X DELETE \
              "/user/packages/container/${PKG}/versions/${id}"
          done
