# Fallback hyprland.conf shipped with atomic-hyprland.
#
# Purpose: give new users a usable Hyprland session on FIRST LOGIN, before
# they have run the LinuxBeginnings/Hyprland-Dots installer. Without this,
# Hyprland falls back to its stock config at /usr/share/hyprland/hyprland.conf
# which hard-binds SUPER+Q -> kitty and leaves most keys unbound. On our
# image ghostty is the default terminal, so those stock binds do nothing.
#
# Minimum viable keys: terminal, close window, launcher, exit session,
# lock screen, workspace switching, move focus.
#
# This file will be overwritten when you run the dots installer -- expected.

$mainMod = SUPER
$term = ghostty
$menu = rofi -show drun
$lockCmd = hyprlock

monitor = , preferred, auto, 1

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 6
}

exec-once = swaync
exec-once = hyprpaper
exec-once = /usr/libexec/mate-polkit/polkit-mate-authentication-agent-1

# Keybinds
bind = $mainMod,       Return, exec, $term
bind = $mainMod,       Q,      killactive
bind = $mainMod,       M,      exit
bind = $mainMod,       D,      exec, $menu
bind = $mainMod,       L,      exec, $lockCmd
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       F,      fullscreen
bind = $mainMod,       E,      exec, nautilus

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = , Print,        exec, grim -g "$(slurp)" - | satty --filename -
bind = SHIFT, Print,   exec, grim - | satty --filename -
